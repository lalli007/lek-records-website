<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Minimal Nav</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <nav class="nav" aria-label="Primary">
        <a href="#timeline">Timeline</a>
        <a href="artists.html">Artists</a>
        <a href="catalogue.html">Catalogue</a>
        <a href="#shop">Shop</a>
        <a href="demodrop.html">Demodrop</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <main id="timeline">
      <div class="logo-wrap">
        <canvas class="logo-canvas" data-src="LEKREC.svg" role="img" aria-label="LEKREC logo"></canvas>
        <noscript>
          <img src="LEKREC.svg" alt="LEKREC logo" class="logo" />
        </noscript>
      </div>
      <a class="text-us" href="https://wa.me/4795444766" target="_blank" rel="noopener">WhatsApp</a>
    </main>

    <aside class="shipping-inline">
      <details class="shipping-details">
        <summary>xx lek rec shipping xx</summary>
        <div class="shipping-content">
          <p>—</p>
          <p class="shipping-title">Your cart</p>
          <p>Shipping: <em>Please choose destination country.</em></p>
          <p>Total: 0.00 €</p>
          <p>—</p>
          <p class="shipping-title">Your invoice details</p>
          <form class="shipping-form" action="#">
            <label>Email*</label>
            <input type="email" />
            <label>Name*</label>
            <input type="text" />
            <label>Street*</label>
            <input type="text" />
            <label>House number*</label>
            <input type="text" />
            <label>Additional</label>
            <input type="text" />
            <label>Zip code*</label>
            <input type="text" />
            <label>State</label>
            <input type="text" />
            <label>City*</label>
            <input type="text" />
            <label>Telephone*</label>
            <input type="tel" />
            <label>Country*</label>
            <select>
              <option>----</option>
              <option>Norway</option>
              <option>EU</option>
              <option>Worldwide</option>
            </select>
            <label>Shipping*</label>
            <div class="shipping-radio">
              <label><input type="radio" name="ship" /> Registered</label>
              <label><input type="radio" name="ship" /> Pick up</label>
            </div>
            <label>Payment</label>
            <div class="shipping-radio">
              <label><input type="radio" name="pay" /> Credit card</label>
              <label><input type="radio" name="pay" /> Paypal</label>
              <label><input type="radio" name="pay" /> iDeal</label>
            </div>
            <label class="shipping-check">
              <input type="checkbox" />
              Agree to SBT and privacy terms.
            </label>
            <button type="button" class="shipping-submit">Place order</button>
          </form>
        </div>
      </details>
    </aside>
  </body>
</html>
